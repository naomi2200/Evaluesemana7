<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinespoiler - Tu Cine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-link {
            background: transparent;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,140,0,0.2);
            color: #ff8c00;
        }

        .nav-link.active {
            background: #ff8c00;
            color: #000;
        }

        .btn-login {
            background: transparent;
            border: 1px solid #ff8c00;
            color: #ff8c00;
            padding: 8px 22px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-login:hover {
            background: #ff8c00;
            color: #000;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 75vh;
            min-height: 550px;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            padding: 0 60px 60px 60px;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(0deg, #0a0a0a 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.3) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        .hero-title {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .hero-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #ddd;
        }

        .hero-meta span {
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .hero-synopsis {
            font-size: 16px;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 25px;
        }

        .btn-primary {
            background: #ff8c00;
            border: none;
            color: #000;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #ffa233;
            transform: scale(1.02);
        }

        /* Secciones */
        .section {
            padding: 50px 40px;
        }

        .section-title {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 28px;
            background: #ff8c00;
            border-radius: 2px;
        }

        /* Slider horizontal */
        .movies-slider {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: thin;
            padding-bottom: 15px;
        }

        .movies-slider::-webkit-scrollbar {
            height: 6px;
        }

        .movies-slider::-webkit-scrollbar-track {
            background: #222;
            border-radius: 10px;
        }

        .movies-slider::-webkit-scrollbar-thumb {
            background: #ff8c00;
            border-radius: 10px;
        }

        .movie-card {
            min-width: 200px;
            width: 200px;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .movie-poster {
            height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .movie-rating-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            color: #ffc107;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .movie-genres {
            font-size: 10px;
            color: #ff8c00;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Modal de detalles de película */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1200;
        }

        .detail-content {
            background: #1a1a1a;
            border-radius: 20px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #ff8c00;
        }

        .detail-header {
            position: relative;
            height: 350px;
            background-size: cover;
            background-position: center;
            border-radius: 20px 20px 0 0;
        }

        .detail-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, #1a1a1a 0%, transparent 100%);
            padding: 30px;
        }

        .detail-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .detail-body {
            padding: 25px;
        }

        .detail-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .detail-info-item {
            background: #252525;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
        }

        .detail-synopsis {
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 20px;
        }

        .detail-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .genre-tag {
            background: #ff8c00;
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-close {
            background: #ff8c00;
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        /* Grid de funciones */
        .showtimes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .showtime-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .showtime-card:hover {
            border-color: #ff8c00;
            transform: translateX(5px);
        }

        .showtime-poster {
            width: 70px;
            height: 100px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .showtime-info {
            flex: 1;
        }

        .showtime-movie {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .showtime-room {
            color: #ff8c00;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .showtime-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .showtime-date {
            font-size: 13px;
            color: #aaa;
        }

        .showtime-price {
            font-size: 20px;
            font-weight: bold;
            color: #ff8c00;
        }

        .btn-buy {
            background: #ff8c00;
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn-buy:hover {
            background: #ffaa33;
        }

        /* Reservas */
        .bookings-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .booking-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 4px solid #ff8c00;
        }

        .booking-info h4 {
            margin-bottom: 8px;
        }

        .booking-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-confirmed {
            background: #28a745;
            color: white;
        }

        .status-cancelled {
            background: #dc3545;
            color: white;
        }

        .btn-cancel {
            background: #dc3545;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-cancel:hover {
            background: #c82333;
        }

        /* Modales básicos */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 35px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            border: 1px solid #ff8c00;
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #ff8c00;
        }

        .btn-modal-confirm {
            background: #ff8c00;
            color: #000;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        .btn-modal-cancel {
            background: transparent;
            border: 1px solid #555;
            color: #ccc;
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: #888;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #444;
            font-size: 12px;
            border-top: 1px solid #1a1a1a;
        }

        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; flex-direction: column; gap: 12px; }
            .hero { padding: 0 20px 30px 20px; height: auto; min-height: 450px; }
            .hero-title { font-size: 32px; }
            .section { padding: 30px 20px; }
            .showtime-card { flex-direction: column; text-align: center; }
            .showtime-poster { width: 100%; height: 150px; }
            .detail-title { font-size: 24px; }
            .detail-header { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🎬 CINESPOILER</div>
        <div class="nav-links">
            <button class="nav-link active" onclick="mostrarSeccion('inicio')">Inicio</button>
            <button class="nav-link" onclick="mostrarSeccion('funciones')">Funciones</button>
            <button class="nav-link" id="misReservasNav" style="display:none;" onclick="mostrarSeccion('reservas')">Mis Reservas</button>
            <div id="authSection" class="user-info">
                <span id="userNameDisplay" style="font-size:14px; color:#ff8c00;"></span>
                <button id="loginBtn" class="btn-login" onclick="mostrarLogin()">Iniciar Sesión</button>
                <button id="logoutBtn" style="display:none;" class="btn-login" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="loading">🎬 Cargando cartelera...</div>
    </div>

    <footer>
        <p>© 2024 Cinespoiler - Tu experiencia cinematográfica</p>
    </footer>

    <!-- Modal Login -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Iniciar Sesión</h2>
            <input type="text" id="loginUsername" placeholder="Usuario">
            <input type="password" id="loginPassword" placeholder="Contraseña">
            <button class="btn-modal-confirm" onclick="login()">Ingresar</button>
            <p style="margin-top:15px; color:#aaa;">¿No tienes cuenta? <a href="#" onclick="mostrarRegistro()" style="color:#ff8c00;">Regístrate aquí</a></p>
            <button class="btn-modal-cancel" onclick="cerrarModal('loginModal')">Cancelar</button>
        </div>
    </div>

    <!-- Modal Registro -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>📝 Crear Cuenta</h2>
            <input type="text" id="regUsername" placeholder="Usuario">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Contraseña">
            <button class="btn-modal-confirm" onclick="register()">Registrarse</button>
            <button class="btn-modal-cancel" onclick="cerrarModal('registerModal')">Cancelar</button>
        </div>
    </div>

    <!-- Modal Compra -->
    <div id="compraModal" class="modal">
        <div class="modal-content">
            <h2>🎟️ Comprar Entrada</h2>
            <p id="modalMovie" style="color:#ff8c00; font-size:18px;"></p>
            <input type="number" id="seatsCount" min="1" max="10" value="1">
            <div style="font-size:24px; font-weight:bold; margin:15px 0;">Total: $<span id="totalPrice">0</span></div>
            <button class="btn-modal-confirm" onclick="confirmarCompra()">Confirmar Compra</button>
            <button class="btn-modal-cancel" onclick="cerrarModal('compraModal')">Cancelar</button>
        </div>
    </div>

    <!-- Modal Detalles Película -->
    <div id="detailModal" class="detail-modal">
        <div class="detail-content">
            <div class="detail-header" id="detailHeader">
                <div class="detail-overlay">
                    <div class="detail-title" id="detailTitle"></div>
                </div>
            </div>
            <div class="detail-body">
                <div class="detail-info" id="detailInfo"></div>
                <div class="detail-synopsis" id="detailSynopsis"></div>
                <div class="detail-genres" id="detailGenres"></div>
                <button class="btn-close" onclick="cerrarModal('detailModal')">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        const TMDB_API_KEY = '3fd2be6f0c70a2a598f084ddfb75487c';
        const TMDB_IMAGE_URL = 'https://image.tmdb.org/t/p/w500';
        
        let currentUser = null;
        let currentShowtimeId = null;
        let currentPrice = 0;
        let currentSection = 'inicio';

        function getToken() { return localStorage.getItem('access_token'); }
        
        async function fetchAuth(url, options = {}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) logout();
            return response;
        }

        async function obtenerImagenPelicula(titulo) {
            if (!titulo) return null;
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(titulo)}`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    return data.results[0].poster_path ? `${TMDB_IMAGE_URL}${data.results[0].poster_path}` : null;
                }
                return null;
            } catch(e) {
                return null;
            }
        }

        async function obtenerImagenBackdrop(titulo) {
            if (!titulo) return null;
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(titulo)}`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    return data.results[0].backdrop_path ? `https://image.tmdb.org/t/p/original${data.results[0].backdrop_path}` : null;
                }
                return null;
            } catch(e) {
                return null;
            }
        }

        // Mostrar detalles de película al hacer clic
        function mostrarDetalles(pelicula) {
            const modal = document.getElementById('detailModal');
            const detailTitle = document.getElementById('detailTitle');
            const detailInfo = document.getElementById('detailInfo');
            const detailSynopsis = document.getElementById('detailSynopsis');
            const detailGenres = document.getElementById('detailGenres');
            const detailHeader = document.getElementById('detailHeader');

            detailTitle.textContent = pelicula.title;
            
            // Mostrar información
            detailInfo.innerHTML = `
                <div class="detail-info-item">🎬 ${pelicula.release_year}</div>
                <div class="detail-info-item">🎭 ${pelicula.director}</div>
                <div class="detail-info-item">⏱️ ${pelicula.duration_minutes} min</div>
                <div class="detail-info-item">⭐ ${pelicula.rating || 'Nuevo'}</div>
            `;
            
            detailSynopsis.textContent = pelicula.synopsis || 'Sin sinopsis disponible.';
            
            // Mostrar géneros
            if (pelicula.genres_detail && pelicula.genres_detail.length > 0) {
                detailGenres.innerHTML = pelicula.genres_detail.map(g => `<span class="genre-tag">${g.name}</span>`).join('');
            } else {
                detailGenres.innerHTML = '<span class="genre-tag">Sin género</span>';
            }
            
            // Cargar imagen de fondo
            obtenerImagenBackdrop(pelicula.title).then(imgUrl => {
                if (imgUrl) {
                    detailHeader.style.backgroundImage = `url(${imgUrl})`;
                    detailHeader.style.backgroundSize = 'cover';
                    detailHeader.style.backgroundPosition = 'center';
                } else {
                    detailHeader.style.background = 'linear-gradient(135deg, #1a1a2e, #16213e)';
                }
            });
            
            modal.style.display = 'flex';
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_URL}/token/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    currentUser = { username };
                    actualizarUI();
                    cerrarModal('loginModal');
                    cargarTodo();
                } else { alert('❌ Usuario o contraseña incorrectos'); }
            } catch(e) { alert('❌ Error de conexión'); }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const res = await fetch(`${API_URL}/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    currentUser = { username };
                    actualizarUI();
                    cerrarModal('registerModal');
                    alert('✅ ¡Registro exitoso!');
                    cargarTodo();
                } else { alert('❌ Error en registro'); }
            } catch(e) { alert('❌ Error de conexión'); }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            currentUser = null;
            actualizarUI();
            cargarTodo();
        }

        function actualizarUI() {
            const token = getToken();
            const userNameSpan = document.getElementById('userNameDisplay');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const misReservasNav = document.getElementById('misReservasNav');
            
            if (token) {
                userNameSpan.textContent = `👤 ${currentUser?.username || 'Usuario'}`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                misReservasNav.style.display = 'block';
            } else {
                userNameSpan.textContent = '';
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                misReservasNav.style.display = 'none';
            }
        }

        function mostrarLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function mostrarRegistro() { cerrarModal('loginModal'); document.getElementById('registerModal').style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        async function cargarMisReservas() {
            const token = getToken();
            if (!token) return '<div class="section"><p>🔐 Inicia sesión para ver tus reservas</p></div>';
            try {
                const res = await fetchAuth(`${API_URL}/bookings/`);
                const bookings = await res.json();
                if (bookings.length === 0) return '<div class="section"><p>🎬 No tienes reservas aún</p></div>';
                return `
                    <div class="section">
                        <div class="section-title">📋 Mis Reservas</div>
                        <div class="bookings-grid">
                            ${bookings.map(b => `
                                <div class="booking-card">
                                    <div class="booking-info">
                                        <h4>${b.movie_title}</h4>
                                        <p>🎪 ${b.room_name} | 📅 ${b.show_date} | 🕐 ${b.show_time}</p>
                                        <p>🎟️ ${b.seats_count} asientos | 💰 $${b.total_price}</p>
                                    </div>
                                    <div>
                                        <span class="booking-status status-${b.status}">${b.status === 'confirmed' ? '✓ Confirmada' : '✗ Cancelada'}</span>
                                        ${b.status === 'confirmed' ? `<button class="btn-cancel" onclick="cancelarReserva(${b.id})">Cancelar</button>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } catch(e) { return '<div class="section"><p>Error cargando reservas</p></div>'; }
        }

        async function cancelarReserva(bookingId) {
            if (!confirm('¿Cancelar esta reserva?')) return;
            try {
                const res = await fetchAuth(`${API_URL}/bookings/${bookingId}/`, { method: 'DELETE' });
                if (res.ok) {
                    alert('✅ Reserva cancelada');
                    cargarTodo();
                } else { alert('❌ Error al cancelar'); }
            } catch(e) { alert('❌ Error de conexión'); }
        }

        async function cargarInicio() {
            const res = await fetch(`${API_URL}/movies/`);
            let peliculas = await res.json();
            
            const recRes = await fetch(`${API_URL}/recomendar/`);
            let recomendacion = null;
            try { recomendacion = await recRes.json(); } catch(e) {}
            
            let heroPoster = '';
            let heroTitle = '';
            let heroYear = '';
            let heroDirector = '';
            let heroSynopsis = '';
            
            if (recomendacion && recomendacion.titulo) {
                const img = await obtenerImagenBackdrop(recomendacion.titulo);
                heroPoster = img ? `url(${img})` : 'linear-gradient(135deg, #1a1a2e, #16213e)';
                heroTitle = recomendacion.titulo;
                heroYear = recomendacion.año;
                heroDirector = recomendacion.director;
                heroSynopsis = recomendacion.sinopsis || '¡No te pierdas esta increíble película!';
            }
            
            const peliculasConImagenes = await Promise.all(peliculas.map(async (p) => {
                const img = await obtenerImagenPelicula(p.title);
                return { ...p, poster: img };
            }));
            
            return `
                <div class="hero" style="background-image: ${heroPoster}; background-size: cover; background-position: center top;">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <div class="hero-title">${heroTitle}</div>
                        <div class="hero-meta">
                            <span>🎬 ${heroYear}</span>
                            <span>🎭 ${heroDirector}</span>
                        </div>
                        <div class="hero-synopsis">${heroSynopsis}</div>
                        <button class="btn-primary" onclick="mostrarSeccion('funciones')">🎟️ Comprar Entradas</button>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">🎬 En Cartelera</div>
                    <div class="movies-slider">
                        ${peliculasConImagenes.map(p => `
                            <div class="movie-card" onclick='mostrarDetalles(${JSON.stringify(p).replace(/'/g, "&#39;")})'>
                                <div class="movie-poster" style="background-image: url(${p.poster || 'https://via.placeholder.com/200x280?text=🎬'}); background-size: cover;">
                                    <div class="movie-rating-badge">⭐ ${p.rating || 'Nuevo'}</div>
                                </div>
                                <div class="movie-info">
                                    <div class="movie-title">${p.title}</div>
                                    <div class="movie-year">${p.release_year}</div>
                                    <div class="movie-genres">🎭 ${p.genres_detail?.map(g => g.name).join(', ') || 'Sin género'}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        async function cargarFunciones() {
            const res = await fetch(`${API_URL}/showtimes/`);
            let funciones = await res.json();
            
            const funcionesConImagenes = await Promise.all(funciones.map(async (f) => {
                const img = await obtenerImagenPelicula(f.movie_title);
                return { ...f, poster: img };
            }));
            
            if (funciones.length === 0) return '<div class="section"><p>🎬 No hay funciones disponibles</p></div>';
            
            return `
                <div class="section">
                    <div class="section-title">🎟️ Próximas Funciones</div>
                    <div class="showtimes-grid">
                        ${funcionesConImagenes.map(f => `
                            <div class="showtime-card">
                                <div class="showtime-poster" style="background-image: url(${f.poster || 'https://via.placeholder.com/70x100?text=🎬'}); background-size: cover;"></div>
                                <div class="showtime-info">
                                    <div class="showtime-movie">${f.movie_title}</div>
                                    <div class="showtime-room">🎪 ${f.room_name}</div>
                                    <div class="showtime-details">
                                        <span class="showtime-date">📅 ${f.show_date}</span>
                                        <span class="showtime-date">🕐 ${f.show_time}</span>
                                    </div>
                                    <div class="showtime-details">
                                        <span class="showtime-price">💰 $${f.price}</span>
                                        <span class="showtime-date">💺 ${f.available_seats} asientos</span>
                                    </div>
                                    <button class="btn-buy" onclick="abrirModalCompra(${f.id}, '${f.movie_title}', ${f.price})">
                                        🎟️ Comprar Entrada
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function mostrarSeccion(seccion) {
            currentSection = seccion;
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            if (seccion === 'inicio') document.querySelectorAll('.nav-link')[0].classList.add('active');
            else if (seccion === 'funciones') document.querySelectorAll('.nav-link')[1].classList.add('active');
            else if (seccion === 'reservas') document.getElementById('misReservasNav').classList.add('active');
            cargarTodo();
        }

        async function cargarTodo() {
            const app = document.getElementById('app');
            let html = '';
            if (currentSection === 'inicio') html = await cargarInicio();
            else if (currentSection === 'funciones') html = await cargarFunciones();
            else if (currentSection === 'reservas') html = await cargarMisReservas();
            app.innerHTML = html;
        }
